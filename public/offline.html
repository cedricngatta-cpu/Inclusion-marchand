<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#C47316" />
  <title>Julaba — Hors connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFF8F0;
      color: #1F2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #C47316;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .logo span {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      background: #C47316;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:active {
      opacity: 0.85;
    }
    .icon-offline {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>J</span></div>
    <div class="icon-offline">&#x1F4F6;</div>
    <h1>Vous etes hors connexion</h1>
    <p>
      Verifiez votre connexion internet et reessayez.
      Les ventes et le stock enregistres localement seront synchronises automatiquement.
    </p>
    <button class="btn" onclick="window.location.reload()">Reessayer</button>
  </div>
</body>
</html>
